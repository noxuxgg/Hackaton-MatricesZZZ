<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLATA — Retos mensuales</title>
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

<div class="topbar fade-up">
  <a href="menu-simulaciones.html" class="topbar-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Volver</a>
  <span class="topbar-title">Retos financieros</span>
  <div style="width:34px"></div>
</div>

<div id="reto-noti" class="reto-noti fade-up fd1">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <div id="reto-noti-msg">Cargando estado del reto...</div>
</div>

<div class="reto-switch fade-up fd2">
  <button class="reto-tab is-active" id="tab-mensual" type="button">Reto mensual</button>
  <button class="reto-tab" id="tab-semanal" type="button">Reto semanal</button>
</div>

<div class="reto-hero fade-up fd3">
  <div class="reto-title" id="reto-title">Reto mensual activo</div>
  <div class="reto-sub" id="reto-sub">Meta de ahorro del mes</div>
  <div class="reto-progress">
    <div class="prog-label"><span id="reto-prog-label">Progreso</span><span id="reto-prog-num">0%</span></div>
    <div class="prog-track"><div class="prog-fill green" id="reto-prog-fill" style="width:0%"></div></div>
    <div class="prog-note" id="reto-note">Seguimiento de tus avances.</div>
  </div>
</div>

<div class="reto-cta fade-up fd4">
  <button id="reto-cta-btn" class="btn-primary" type="button">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    Continuar
  </button>
</div>
<div class="reto-meta-controls fade-up fd4">
  <button id="meta-down-btn" class="reto-meta-btn down" type="button">Disminuir meta</button>
  <button id="meta-up-btn" class="reto-meta-btn up" type="button">Aumentar meta</button>
</div>

<div class="reto-streak fade-up fd5">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <span class="card-title">Racha de semanas</span>
    <span class="tag tag-b" id="streak-badge">0 semanas</span>
  </div>
  <div style="font-size:11px;color:var(--txt2);margin-top:4px">Semanas recientes en las que cumpliste tu reto.</div>
  <div class="reto-streak-grid" id="streak-grid"></div>
</div>

<div class="pb-nav"></div>
<nav class="bottom-nav">
  <a href="../index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Inicio</span></a>
  <a href="salud-financiera.html" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Mi salud</span></a>
  <a href="chatbox.html" class="nav-center"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a>
  <a href="aprender.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>Aprender</span></a>
  <a href="mi-perfil.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Mi perfil</span></a>
</nav>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/sim-sounds.js"></script>
<script src="../assets/js/guide.js"></script>
<script>
(function () {
  var guide = null;
  if (typeof PlataGuide !== 'undefined') {
    guide = PlataGuide.boot('retos', [
      { html: 'Paso 1: revisá si <strong>cumpliste</strong> o <strong>no cumpliste</strong> el reto. Cambiá entre mensual/semanal si querés.', cta: 'Ok' },
      { html: 'Paso 2: probá <strong>aumentar</strong> o <strong>disminuir</strong> la meta para ver cómo cambia el progreso.', cta: 'Entendido' },
      { html: 'Paso 3: tocá el botón principal para terminar esta simulación.', cta: 'Vamos' }
    ]);
  }
  var params = new URLSearchParams(window.location.search);
  var estadoForzado = params.get('estado'); // cumplido | nocumplido
  var retos = {
    mensual: { tipo: 'mensual', meta: 900, logrado: 980, cumplio: true, periodo: 'Abril 2026' },
    semanal: { tipo: 'semanal', meta: 220, logrado: 165, cumplio: false, periodo: 'Semana actual' }
  };
  var streak = [true, true, true, false, true, true, false];
  var actual = 'mensual';

  var tabMensual = document.getElementById('tab-mensual');
  var tabSemanal = document.getElementById('tab-semanal');
  var noti = document.getElementById('reto-noti');
  var notiMsg = document.getElementById('reto-noti-msg');
  var title = document.getElementById('reto-title');
  var sub = document.getElementById('reto-sub');
  var progNum = document.getElementById('reto-prog-num');
  var progFill = document.getElementById('reto-prog-fill');
  var progLabel = document.getElementById('reto-prog-label');
  var note = document.getElementById('reto-note');
  var cta = document.getElementById('reto-cta-btn');
  var metaUpBtn = document.getElementById('meta-up-btn');
  var metaDownBtn = document.getElementById('meta-down-btn');
  var streakGrid = document.getElementById('streak-grid');
  var streakBadge = document.getElementById('streak-badge');

  function sound(ok) {
    if (typeof SimSounds === 'undefined') return;
    try {
      SimSounds.init();
      ok ? SimSounds.playAccept() : SimSounds.playReject();
    } catch (e) {}
  }

  function renderStreak() {
    streakGrid.innerHTML = '';
    var names = ['S1', 'S2', 'S3', 'S4', 'S5', 'S6', 'S7'];
    var total = 0;
    streak.forEach(function (ok, i) {
      if (ok) total += 1;
      var cell = document.createElement('div');
      cell.className = 'reto-week ' + (ok ? 'ok' : 'bad');
      cell.innerHTML = '<div class="reto-week-k">' + names[i] + '</div><div class="reto-week-v">' + (ok ? 'Cumplio' : 'No cumplio') + '</div>';
      streakGrid.appendChild(cell);
    });
    streakBadge.textContent = total + ' semanas cumplidas';
  }

  function renderReto() {
    var r = retos[actual];
    if (estadoForzado === 'cumplido') r.cumplio = true;
    if (estadoForzado === 'nocumplido') r.cumplio = false;
    var pct = Math.max(0, Math.min(100, Math.round((r.logrado / r.meta) * 100)));
    title.textContent = 'Reto ' + r.tipo + ' activo';
    sub.textContent = r.periodo + ' · Meta: Bs. ' + r.meta.toFixed(2) + ' · Logrado: Bs. ' + r.logrado.toFixed(2);
    progLabel.textContent = r.tipo === 'mensual' ? 'Progreso del mes' : 'Progreso de la semana';
    progNum.textContent = pct + '%';
    progFill.style.width = pct + '%';

    noti.classList.remove('ok', 'bad');
    if (r.cumplio) {
      noti.classList.add('ok');
      notiMsg.innerHTML = 'Cumpliste tu reto ' + r.tipo + '. <strong>Recomendacion:</strong> subi tu meta en 10% para el proximo periodo.';
      note.textContent = 'Excelente consistencia. Estas listo para subir el nivel del reto.';
      cta.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Aumentar meta ' + r.tipo;
    } else {
      noti.classList.add('bad');
      notiMsg.innerHTML = 'No cumpliste tu reto ' + r.tipo + '. Revisa tus gastos y ajusta tu plan para recuperar ritmo.';
      note.textContent = 'Advertencia: prioriza gastos de necesidad para volver a la meta.';
      cta.innerHTML = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Ver advertencias del reto';
    }
  }

  tabMensual.addEventListener('click', function () {
    actual = 'mensual';
    tabMensual.classList.add('is-active');
    tabSemanal.classList.remove('is-active');
    renderReto();
    sound(true);
    if (guide) guide.stepDone();
  });
  tabSemanal.addEventListener('click', function () {
    actual = 'semanal';
    tabSemanal.classList.add('is-active');
    tabMensual.classList.remove('is-active');
    renderReto();
    sound(false);
    if (guide) guide.stepDone();
  });
  cta.addEventListener('click', function () {
    sound(retos[actual].cumplio);
    if (guide) guide.finish();
  });
  metaUpBtn.addEventListener('click', function () {
    var r = retos[actual];
    r.meta = Math.round(r.meta * 1.1);
    renderReto();
    sound(true);
    if (guide) guide.stepDone();
  });
  metaDownBtn.addEventListener('click', function () {
    var r = retos[actual];
    r.meta = Math.max(50, Math.round(r.meta * 0.9));
    renderReto();
    sound(false);
    if (guide) guide.stepDone();
  });

  renderStreak();
  setTimeout(function () {
    renderReto();
    sound(retos[actual].cumplio);
  }, 350);
})();
</script>
</body>
</html>
